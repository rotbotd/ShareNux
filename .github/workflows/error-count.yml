name: Error Count Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-errors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need history for baseline

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Get current error count
        id: current
        run: |
          count=$(dotnet build ShareX.HelpersLib/ShareX.HelpersLib.csproj 2>&1 | grep -c "error CS" || true)
          echo "count=$count" >> $GITHUB_OUTPUT
          echo "Current error count: $count"

      - name: Get baseline error count
        id: baseline
        run: |
          # read from .error-baseline file
          if [ -f .error-baseline ]; then
            baseline=$(cat .error-baseline)
          else
            baseline=999999
          fi
          echo "count=$baseline" >> $GITHUB_OUTPUT
          echo "Baseline error count: $baseline"

      - name: Compare counts
        run: |
          current=${{ steps.current.outputs.count }}
          baseline=${{ steps.baseline.outputs.count }}
          echo "Current: $current"
          echo "Baseline: $baseline"
          
          if [ "$current" -gt "$baseline" ]; then
            echo "❌ Error count increased from $baseline to $current"
            exit 1
          elif [ "$current" -lt "$baseline" ]; then
            echo "✅ Error count decreased from $baseline to $current (−$((baseline - current)))"
          else
            echo "➖ Error count unchanged at $current"
          fi

      - name: Update baseline on main
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          current=${{ steps.current.outputs.count }}
          echo "$current" > .error-baseline
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .error-baseline
          git diff --cached --quiet || git commit -m "update error baseline: $current"
          git push
